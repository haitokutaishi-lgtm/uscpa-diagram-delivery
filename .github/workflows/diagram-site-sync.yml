# publish-html を diagram-site の GitHub Pages に反映する（main への push 時）
#
# 必要なシークレット（このリポジトリの Settings → Secrets）:
#   DIAGRAM_SITE_DEPLOY_KEY … diagram-site リポジトリの write 権限つき Deploy Key（SSH 秘密鍵）

name: Sync diagram-site topics

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches:
      - main
    paths:
      - "publish-html/**"
      - "ops/diagram-publish-manifest.json"
      - "ops/sync_diagram_site.sh"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          path: far

      - name: Validate deploy key
        env:
          DEPLOY_KEY: ${{ secrets.DIAGRAM_SITE_DEPLOY_KEY }}
        run: |
          if [ -z "${DEPLOY_KEY}" ]; then
            echo "::error::DIAGRAM_SITE_DEPLOY_KEY が未設定です。diagram-site へ push できません。"
            exit 1
          fi

      - uses: actions/checkout@v5
        with:
          repository: haitokutaishi-lgtm/diagram-site
          ssh-key: ${{ secrets.DIAGRAM_SITE_DEPLOY_KEY }}
          ref: main
          path: diagram-site
          persist-credentials: true

      - name: Copy manifest topics
        run: bash far/ops/sync_diagram_site.sh far diagram-site

      - name: Commit and push
        working-directory: diagram-site
        env:
          FAR_SHA: ${{ github.sha }}
          FAR_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add topics
          if git diff --cached --quiet; then
            echo "No topic file changes."
            exit 0
          fi
          git commit -m "chore(topics): sync from ${FAR_REPO}@${FAR_SHA:0:7}"
          for i in 1 2 3 4 5; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi
            echo "::warning::diagram-site push retry $i ..."
            sleep 5
          done
          echo "::error::diagram-site への push に失敗。DIAGRAM_SITE_DEPLOY_KEY（diagram-site の write 権限つき Deploy Key）を確認してください。"
          exit 1
