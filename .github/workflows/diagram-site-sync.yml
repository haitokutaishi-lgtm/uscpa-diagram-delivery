# publish-html を diagram-site の GitHub Pages に反映する（main への push 時）
#
# 必要なシークレット（このリポジトリの Settings → Secrets）:
#   DIAGRAM_SITE_PUSH_TOKEN … diagram-site リポジトリへの contents:write が付いた PAT

name: Sync diagram-site topics

on:
  push:
    branches:
      - main
    paths:
      - "publish-html/**"
      - "ops/diagram-publish-manifest.json"
      - "ops/sync_diagram_site.sh"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          path: far

      - name: Validate deploy token
        env:
          PAT: ${{ secrets.DIAGRAM_SITE_PUSH_TOKEN }}
        run: |
          if [ -z "${PAT}" ]; then
            echo "::error::DIAGRAM_SITE_PUSH_TOKEN が未設定です。diagram-site へ push できません。"
            exit 1
          fi

      - uses: actions/checkout@v5
        with:
          repository: haitokutaishi-lgtm/diagram-site
          token: ${{ secrets.DIAGRAM_SITE_PUSH_TOKEN }}
          ref: main
          path: diagram-site

      - name: Copy manifest topics
        run: bash far/ops/sync_diagram_site.sh far diagram-site

      - name: Commit and push
        working-directory: diagram-site
        env:
          FAR_SHA: ${{ github.sha }}
          FAR_REPO: ${{ github.repository }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add topics
          if git diff --cached --quiet; then
            echo "No topic file changes."
          else
            git commit -m "chore(topics): sync from ${FAR_REPO}@${FAR_SHA:0:7}"
            git push origin HEAD:main
          fi
