# 日・水・土 9:00 JST (= UTC 日・水・土 0:00) に実行
# 秘密情報: Repository secrets に DISCORD_WEBHOOK_URL を設定（プレーンテキストでコミットしない）

name: Discord 図解配信

on:
  schedule:
    - cron: "0 0 * * 0" # 日曜 09:00 JST
    - cron: "0 0 * * 3" # 水曜 09:00 JST
    - cron: "0 0 * * 6" # 土曜 09:00 JST
  workflow_dispatch:
    inputs:
      post_date:
        description: "posts.json の日付キー（YYYY-MM-DD）。空のまま＝今日（日本時間）"
        required: false
        default: ""
        type: string

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Post today entry to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TZ: Asia/Tokyo
        run: |
          set -euo pipefail
          FILE="schedule/posts.json"
          echo "Git SHA: $(git rev-parse HEAD)"
          echo "GitHub event: ${GITHUB_EVENT_NAME:-}"

          # 手動実行の日付はイベント JSON から読む（YAML の式より確実）
          MANUAL=""
          if [ "${GITHUB_EVENT_NAME:-}" = "workflow_dispatch" ] && [ -f "${GITHUB_EVENT_PATH:-}" ]; then
            MANUAL=$(jq -r '.inputs.post_date // empty | if . == null or . == "" then empty else . end' "$GITHUB_EVENT_PATH" || true)
          fi
          if [ -n "${MANUAL}" ]; then
            TODAY=$(echo -n "$MANUAL" | tr -d ' \t\r\n')
            echo "Using workflow input post_date: $TODAY"
          else
            TODAY=$(date +%Y-%m-%d)
            echo "Today (Asia/Tokyo): $TODAY"
          fi

          echo "Keys in $FILE (except _comment):"
          jq -r 'keys[] | select(. != "_comment")' "$FILE" || true
          echo "— need an exact key match for: $TODAY"

          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "::error::DISCORD_WEBHOOK_URL secret is not set"
            exit 1
          fi
          WH_HOST=$(echo "$DISCORD_WEBHOOK_URL" | sed -n 's|https://\([^/]*\).*|\1|p')
          echo "Webhook host (no secret): ${WH_HOST:-unknown}"

          # content も付ける → チャンネルに必ず1行は出る（embed 非表示トラブル回避）
          PAYLOAD=$(jq -c --arg d "$TODAY" '
            . as $root | $root[$d]
            | if . == null then
                empty
              else
                {
                  content: ("【図解配信】 " + .title),
                  embeds: [{
                    title: .title,
                    description: .description,
                    url: .url,
                    color: 3447003
                  }]
                }
              end
          ' "$FILE")

          if [ -z "$PAYLOAD" ] || [ "$PAYLOAD" = "null" ]; then
            echo "No post for $TODAY — skipping. Add key \"$TODAY\" to $FILE on branch main, push, then run workflow again."
            exit 0
          fi

          echo "Payload bytes: ${#PAYLOAD}"

          HTTP=$(curl -sS -o /tmp/discord.out -w "%{http_code}" \
            -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d "$PAYLOAD")

          echo "Discord response body:"
          cat /tmp/discord.out || true
          echo ""

          if [ "$HTTP" -lt 200 ] || [ "$HTTP" -ge 300 ]; then
            echo "::error::Discord API HTTP $HTTP"
            exit 1
          fi
          echo "OK Posted for $TODAY (HTTP $HTTP)"
