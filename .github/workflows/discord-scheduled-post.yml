# 日・水・土 9:00 JST (= UTC 日・水・土 0:00) に実行
# 秘密情報: Repository secrets に DISCORD_WEBHOOK_URL を設定（プレーンテキストでコミットしない）

name: Discord 図解配信

on:
  schedule:
    - cron: "0 0 * * 0" # 日曜 09:00 JST
    - cron: "0 0 * * 3" # 水曜 09:00 JST
    - cron: "0 0 * * 6" # 土曜 09:00 JST
  workflow_dispatch:
    inputs:
      post_date:
        description: "posts.json の日付キー（YYYY-MM-DD）。空のまま＝今日（日本時間）"
        required: false
        default: ""
        type: string

jobs:
  post:
    runs-on: ubuntu-latest
    # actions/checkout v4 は Node 20 前提の警告が出るため、Node 24 対応の v5 以降を使う
    # 参考: https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Post today entry to Discord
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TZ: Asia/Tokyo
        run: |
          set -euo pipefail
          FILE="schedule/posts.json"
          MANUAL="${{ github.event_name == 'workflow_dispatch' && github.event.inputs.post_date || '' }}"
          if [ -n "${MANUAL}" ]; then
            TODAY="${MANUAL}"
            echo "Using manual date from workflow input: $TODAY"
          else
            TODAY=$(date +%Y-%m-%d)
            echo "Today (Asia/Tokyo): $TODAY"
          fi
          echo "Keys in $FILE (except _comment):"
          jq -r 'keys[] | select(. != "_comment")' "$FILE" || true
          echo "— posting only if one of the keys above equals: $TODAY"
          if [ -z "${DISCORD_WEBHOOK_URL:-}" ]; then
            echo "::error::DISCORD_WEBHOOK_URL secret is not set"
            exit 1
          fi
          PAYLOAD=$(jq -c --arg d "$TODAY" '
            . as $root | $root[$d]
            | if . == null then
                empty
              else
                {
                  embeds: [{
                    title: .title,
                    description: .description,
                    url: .url,
                    color: 3447003
                  }]
                }
              end
          ' "$FILE")

          if [ -z "$PAYLOAD" ] || [ "$PAYLOAD" = "null" ]; then
            echo "No post for $TODAY — skipping. Add a key \"$TODAY\" to $FILE to post today, then re-run the workflow."
            exit 0
          fi

          HTTP=$(curl -sS -o /tmp/discord.out -w "%{http_code}" \
            -X POST "$DISCORD_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          if [ "$HTTP" -lt 200 ] || [ "$HTTP" -ge 300 ]; then
            echo "::error::Discord API HTTP $HTTP"
            cat /tmp/discord.out
            exit 1
          fi
          echo "Posted for $TODAY (HTTP $HTTP)"
